<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Profiling</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f6fa;
        color: #1f2937;
      }
      .container {
        max-width: 900px;
        margin: 32px auto;
        background: #fff;
        border-radius: 10px;
        padding: 24px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .error {
        color: #b91c1c;
        margin-top: 12px;
      }
      .result {
        margin-top: 20px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
      }
      button {
        padding: 8px 14px;
        border: none;
        background: #2563eb;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Face Profiling Demo</h1>
      <p class="muted">FastAPI backend + Flask frontend. API URL: {{ api_url }}</p>

      <form method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required />
        <button type="submit">Analyze</button>
      </form>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}

      {% if result %}
      <div class="result">
        <pre>{{ result | tojson(indent=2) }}</pre>
      </div>
      {% endif %}
    </div>
  </body>
</html>
